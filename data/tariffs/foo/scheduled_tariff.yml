supplier: foo
product: three-zone scheduled tariff
defaults:
  - start: 2025-01-01T00:00:00+01:00
    formula:
      - when: # forumula valid for weekday mornings
          days: [monday, tuesday, wednesday, thursday, friday]
          time_ranges:
            - start: "06:00:00"
              end: "10:00:00"
        constant_cost: 300.0
      - when: # formula valid for weekend daytime
          days: [saturday, sunday]
          time_ranges:
            - start: "07:00:00"
              end: "19:00:00"
        constant_cost: 300.0
      - when: # formula valid any day during late morning and evening (Overlaps with the previous definition in weekends, the first matching formula will be used, so the weekend daytime formula will take precedence over this one in the overlapping time range)
          time_ranges:
            - start: "10:00:00"
              end: "13:00:00"
            - start: "18:00:00"
              end: "22:00:00"
        constant_cost: 150.0
      - constant_cost: 100.0 # formula valid at all times not covered by the previous definitions
