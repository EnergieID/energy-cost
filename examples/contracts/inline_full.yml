# A fully inlined contract — all tariff components defined directly.
# Useful when the region is not supported or for handling special cases.
supplier:
- start: 2025-01-01T00:00:00+01:00
  consumption:
    constant_cost: 90.0
  injection:
    constant_cost: -15.0

distributor:
- start: 2025-01-01T00:00:00+01:00
  capacity:
    constant_cost: 50.0
  fixed:
    grid_fee:
      period: P1M
      constant_cost: 10.0

fees:
- start: 2025-01-01T00:00:00+01:00
  consumption:
    constant_cost: 20.0

taxes:
- start: 2025-01-01T00:00:00+01:00
  default: 0.06
  rates:
  - rate: 0.0
    columns:
    - ["*", "injection", "*"]

capacity_rule:
  measurement_period: PT15M
  billing_period: P1M

timezone: Europe/Brussels
