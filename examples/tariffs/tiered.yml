- start: 2025-01-01T00:00:00+01:00
  consumption:
    formula:
      band_period: P1M # the period over which consumption is measured for tiering purposes in ISO 8601 duration format
      bands:
      - up_to: 0.5 # if consumption in a band period does not exceed 0.5 MWh, it is billed according to this formula
        formula: # a fixed cost component of 5 €/month
          period: P1M
          constant_cost: 5.0 
      - formula: # the consumption above 0.5 MWh is billed according to this formula
          constant_cost: 10.0 # usage based costs of 10 €/MWh