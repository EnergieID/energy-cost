name: notebooks

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.9.21'
      - name: Install dependencies
        run: uv sync
      - name: Install poethepoet
        run: uv tool install poethepoet
      - name: Re-execute all notebooks
        run: poe rerun-notebooks
      - name: Check notebooks are unchanged
        run: |
          if git diff --exit-code notebooks/; then
            echo "All notebooks are stable."
          else
            echo "::error::Notebooks have changed after re-execution. Please commit the updated notebooks."
            git diff --stat notebooks/
            exit 1
          fi
